name: Seat Checker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# O singură rulare la un moment dat — evită două job-uri care scriu în cache și se suprascriu.
concurrency:
  group: seat-checker
  cancel-in-progress: false

jobs:
  check-seats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Create state directory
        run: mkdir -p .seat-checker-state

      # Restaurăm ultima valoare salvată (prefix match = ultimul cache creat; cheie unică per run evită "another job may be creating this cache").
      - name: Restore last value from previous run
        uses: actions/cache/restore@v4
        with:
          path: .seat-checker-state
          key: seat-checker-last-value-${{ github.run_id }}
          restore-keys: |
            seat-checker-last-value-

      - name: Show restored state (debug)
        run: |
          if [ -f .seat-checker-state/last.json ]; then
            echo "📂 Restaurat din cache: $(cat .seat-checker-state/last.json)";
          else
            echo "📂 Nu există cache (primă rulare sau cache lipsă)";
          fi

      # 1) Citește .seat-checker-state/last.json  2) Compară cu count de pe site
      # 3) Trimite mesaj doar dacă difference != 0 (sau primă verificare)
      # 4) Scrie count curent în .seat-checker-state/last.json
      - name: Run checker
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ELEMENT_XPATH: ${{ secrets.ELEMENT_XPATH }}
          SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node checker.js

      # Salvăm cu cheie unică per rulare → nicio conflictare cu alt job.
      - name: Save last value for next run
        uses: actions/cache/save@v4
        with:
          path: .seat-checker-state
          key: seat-checker-last-value-${{ github.run_id }}