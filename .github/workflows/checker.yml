name: Seat Checker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-seats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      # Restaurăm last.json din cache (valoarea salvată la SFÂRȘITUL rulării precedente).
      # Fără acest pas, last.json nu există pe runner → scriptul consideră "primă verificare".
      - name: Restore last value from previous run
        uses: actions/cache@v4
        with:
          path: last.json
          key: seat-checker-last-value

      # 1) Citește last.json (valoarea precedentă)  2) Compară cu count de pe site
      # 3) Trimite mesaj doar dacă difference != 0 (sau primă verificare)
      # 4) La sfârșit scrie last.json cu count curent → cache îl salvează după job
      - name: Run checker
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ELEMENT_XPATH: ${{ secrets.ELEMENT_XPATH }}
          SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node checker.js