name: Seat Checker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-seats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run checker
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ELEMENT_XPATH: ${{ secrets.ELEMENT_XPATH }}
          SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: node checker.js
      
      - name: Commit users.json if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add users.json || true
          git diff --staged --quiet || (git commit -m "Update users.json [skip ci]" && git push)
